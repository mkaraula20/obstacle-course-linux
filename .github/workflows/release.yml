name: Release builds (Android + macOS + Windows + Linux)

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.3.0 && git push origin v0.3.0
# Each platform job builds and uploads its installers as a workflow artifact;
# a final job collects them all and publishes ONE GitHub Release. (Having every
# job write the release directly races and randomly drops an asset.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Generate native android project
        run: npx expo prebuild --platform android --no-install
      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: build-android
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Build desktop app (.dmg) via Tauri
        run: npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}
      - run: npm ci
      - name: Build Windows installers (${{ matrix.arch }}) via Tauri
        run: npm run tauri:build -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-windows-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error

  linux:
    # Native builds on each arch (cross-compiling Tauri + WebKitGTK is painful).
    # Built on 22.04 for broad glibc compatibility with older distros.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x64
          - runner: ubuntu-22.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: linux-${{ matrix.arch }}
      - run: npm ci
      - name: Build Linux .deb (${{ matrix.arch }})
        run: npm run tauri:build -- --bundles deb
      - name: Build Linux AppImage (${{ matrix.arch }}, best-effort)
        run: npm run tauri:build -- --bundles appimage
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: build-linux-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    # Single writer: collect every platform's artifacts and publish one Release.
    needs: [android-apk, macos-dmg, windows, linux]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List collected artifacts
        run: ls -lhR artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: .github/RELEASE_NOTES.md
          fail_on_unmatched_files: false
