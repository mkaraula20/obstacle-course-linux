name: Release builds (APK + DMG)

# Cut a release by pushing a tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds the Android debug APK (installable for Appium / mobile QA) and the
# macOS .dmg (desktop), and attaches both to the GitHub Release for that tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Generate native android project
        run: npx expo prebuild --platform android --no-install
      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android
      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: true

  macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Build desktop app (.dmg) via Tauri
        run: npm run tauri:build
      - name: Attach DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
