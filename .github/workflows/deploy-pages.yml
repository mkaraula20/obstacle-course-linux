name: Deploy web app to GitHub Pages

# Builds the React-Native-Web app and publishes dist/ to GitHub Pages on every
# push to main, so colleagues always have a live URL to point QA automation
# frameworks at: https://mkaraula01.github.io/obstacle-course/
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build web app (Pages base path)
        run: npm run build
        env:
          GITHUB_PAGES: "true"
      # Requires Pages to be enabled once: repo Settings → Pages →
      # "Build and deployment" → Source: "GitHub Actions".
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
